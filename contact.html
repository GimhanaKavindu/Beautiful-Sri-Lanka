<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Your Trip | Contact</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header>
        <div class="navbar">
            <div class="logo">
                 <span class="logo-text">The Pearl Trails</span>
                <img src="images/logo.png" alt="The Pearl Trails Logo" onerror="this.src='logo.png'">
            </div>
            <button class="menu-toggle" id="menu-toggle">&#9776;</button>
            <nav id="nav-links">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="destinations.html">Destinations</a></li>
                    <li><a href="travel-tips.html">Travel Tips</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="form-section">
            <h2>Connect With Our Travel Advisors</h2>
            <p>Have questions about visiting Sri Lanka? Fill out the form below to drop us an inquiry message.</p>
            
            <form id="contactForm" class="contact-form">
                <div class="form-group">
                    <label for="name">Your Name:</label>
                    <input type="text" id="name" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="email">Your Email Address:</label>
                    <input type="email" id="email" required placeholder="Enter your email address">
                </div>
                <div class="form-group">
                    <label for="message">What details do you need help with?</label>
                    <textarea id="message" rows="5" required placeholder="Ask us about hotels, transport, itineraries..."></textarea>
                </div>
                <button type="submit" class="btn">Send Inquiry</button>
            </form>
            <div id="formFeedback" class="form-feedback"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Uva Wellassa University Assignment. All Rights Reserved.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
